<div id="cancel-form">
        <form action="cancel_order.php" method="POST">
            <div class="form-group">
                <label for="order_id">Enter Order ID to Cancel:</label>
                <input type="text" id="order_id" name="order_id" placeholder="Enter your Order ID"required>
            </div>
            <br>
            <div class="form-group">
                <label for="cust_phone">Customer Phone Number:</label>
                <input type="tel" id="cust_phone" name="cust_phone" placeholder="Enter your Order ID"required>
              
            </div>
            <input type="hidden" id="Hotel_name" name="Hotel_name">
            <br>
            <button type="submit">Cancel Order</button>
        </form>
        
    </div>
    <script>
        function showForm(type) {
          const orderForm = document.getElementById('order-form');
          const cancelForm = document.getElementById('cancel-form');
      
          if (type === 'order') {
            orderForm.style.display = 'block';
            cancelForm.style.display = 'none';
          } else if (type === 'cancel') {
            cancelForm.style.display = 'block';
            orderForm.style.display = 'none';
          }
        }
      
        const urlParams = new URLSearchParams(window.location.search);
        const hotelNameFromUrl = urlParams.get('Hotel_name');
        if (hotelNameFromUrl) {
          const hiddenInputs = document.querySelectorAll('input[name="Hotel_name"]');
          hiddenInputs.forEach(input => input.value = hotelNameFromUrl);
        }
      
        window.onload = function () {
          const hotelName = new URLSearchParams(window.location.search).get("Hotel_name");
          if (hotelName) {
            const hiddenInputs = document.querySelectorAll('input[name="Hotel_name"]');
            hiddenInputs.forEach(input => input.value = decodeURIComponent(hotelName));
          }
        }
      </script>
      
</body>
